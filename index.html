<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Capture</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #1a1a1a; color: #fff; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; border: none; border-radius: 5px; margin: 10px; font-weight: bold; }
        #startBtn { background-color: #e74c3c; color: white; }
        #stopBtn { background-color: #7f8c8d; color: white; display: none; }
        video { display: none; /* Hidden by default for stealth */ margin-top: 20px; max-width: 400px; border-radius: 8px; }
    </style>
</head>
<body>

    <h2>Click to Start</h2>
    <button id="startBtn">Start Capture</button>
    <button id="stopBtn">Stop & Save</button>
    <video id="preview" autoplay muted></video>

    <script>
        let mediaRecorder;
        let recordedChunks = [];
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const videoElement = document.getElementById('preview');

        startBtn.addEventListener('click', async () => {
            try {
                // Request both video and audio
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                
                // Optional: Show preview (remove this line if you want it completely hidden)
                // videoElement.srcObject = stream; 
                // videoElement.style.display = 'block';

                mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });

                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        recordedChunks.push(event.data);
                    }
                };

                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = url;
                    a.download = 'capture_' + new Date().getTime() + '.webm';
                    document.body.appendChild(a);
                    a.click();
                    setTimeout(() => {
                        document.body.removeChild(a);
                        window.URL.revokeObjectURL(url);
                    }, 100);
                    recordedChunks = []; // Reset
                };

                mediaRecorder.start();
                startBtn.style.display = 'none';
                stopBtn.style.display = 'inline-block';
                stopBtn.style.backgroundColor = '#2ecc71';

            } catch (err) {
                console.error("Error accessing media devices.", err);
                alert("Permissions denied or devices not found.");
            }
        });

        stopBtn.addEventListener('click', () => {
            mediaRecorder.stop();
            // Stop all tracks to turn off the camera light
            mediaRecorder.stream.getTracks().forEach(track => track.stop());
            
            startBtn.style.display = 'inline-block';
            stopBtn.style.display = 'none';
            videoElement.style.display = 'none';
        });
    </script>
</body>
</html>
